name: CI

on:
  push:
    branches: [master, feat/v2]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run biome:lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
